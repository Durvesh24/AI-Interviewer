<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - AI Interview Coach</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="auth-page">

    <button id="themeToggle" class="theme-toggle" aria-label="Toggle Dark Mode"
        style="position: absolute; top: 1.5rem; right: 1.5rem; z-index: 10;">
        <span>🌙</span>
    </button>

    <div class="auth-card">
        <div class="text-center mb-4">
            <div class="auth-logo">🔒</div>
            <h2>Reset Password</h2>
            <p>Create a new strong password for your account.</p>
        </div>

        <!-- Error State (invalid/missing token) -->
        <div id="errorMsg" class="hidden"
            style="background: rgba(239,68,68,0.1); border: 1px solid #EF4444; border-radius: var(--radius-md); padding: 1.25rem; text-align: center; margin-bottom: 1rem;">
            <p id="errorText" style="color: #EF4444; margin: 0; font-weight: 600;"></p>
            <a href="forgot-password.html" style="display: inline-block; margin-top: 0.75rem; color: var(--primary); font-weight: 600; font-size: 0.9rem;">Request a new link →</a>
        </div>

        <form id="resetForm">
            <div class="auth-input-group">
                <label for="newPassword">New Password</label>
                <div class="password-wrapper">
                    <input type="password" id="newPassword" class="auth-input" placeholder="Create a strong password" required>
                    <button type="button" class="toggle-password" id="toggleNew" aria-label="Show/Hide Password">👁</button>
                </div>
                <!-- Strength Bar -->
                <div class="strength-bar-wrapper">
                    <div class="strength-bar-fill" id="strengthBar"></div>
                </div>
                <div class="strength-label" id="strengthLabel"></div>
                <!-- Requirement Checklist -->
                <ul class="req-list">
                    <li class="req-item" id="req-len">8+ characters</li>
                    <li class="req-item" id="req-upper">Uppercase letter</li>
                    <li class="req-item" id="req-lower">Lowercase letter</li>
                    <li class="req-item" id="req-num">Number</li>
                    <li class="req-item" id="req-special">Special character</li>
                </ul>
            </div>

            <div class="auth-input-group">
                <label for="confirmPassword">Confirm Password</label>
                <div class="password-wrapper">
                    <input type="password" id="confirmPassword" class="auth-input" placeholder="••••••••" required>
                    <button type="button" class="toggle-password" id="toggleConfirm" aria-label="Show/Hide Password">👁</button>
                </div>
            </div>

            <button type="submit" id="submitBtn" class="btn btn-primary auth-btn">Reset Password</button>
        </form>

        <!-- Success State -->
        <div id="successMsg" class="hidden" style="text-align: center; margin-top: 1rem;">
            <div style="font-size: 2.5rem; margin-bottom: 0.75rem;">✅</div>
            <p style="color: #10B981; font-weight: 700; font-size: 1.1rem;">Password reset successfully!</p>
            <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 1.25rem;">You can now sign in with your new password.</p>
            <a href="login.html" class="btn btn-primary">Go to Login</a>
        </div>
    </div>

    <script src="js/main.js"></script>

    <script>
        const API_BASE_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
            ? 'http://localhost:5000' : '';

        // Get token from URL
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            document.getElementById('errorText').innerText = 'Invalid or missing reset token. Please request a new link.';
            document.getElementById('errorMsg').classList.remove('hidden');
            document.getElementById('resetForm').style.display = 'none';
        }

        /* ---- Show / Hide Toggles ---- */
        function makeToggle(btnId, inputId) {
            document.getElementById(btnId).addEventListener('click', () => {
                const inp = document.getElementById(inputId);
                const btn = document.getElementById(btnId);
                if (inp.type === 'password') {
                    inp.type = 'text';
                    btn.textContent = '🙈';
                } else {
                    inp.type = 'password';
                    btn.textContent = '👁';
                }
            });
        }
        makeToggle('toggleNew', 'newPassword');
        makeToggle('toggleConfirm', 'confirmPassword');

        /* ---- Strength Engine ---- */
        const strengthBar   = document.getElementById('strengthBar');
        const strengthLabel = document.getElementById('strengthLabel');
        const reqs = {
            len:     { el: document.getElementById('req-len'),     test: p => p.length >= 8 },
            upper:   { el: document.getElementById('req-upper'),   test: p => /[A-Z]/.test(p) },
            lower:   { el: document.getElementById('req-lower'),   test: p => /[a-z]/.test(p) },
            num:     { el: document.getElementById('req-num'),     test: p => /[0-9]/.test(p) },
            special: { el: document.getElementById('req-special'), test: p => /[^A-Za-z0-9]/.test(p) }
        };

        const levels = [
            { pct: '20%', barClass: 'strength-weak',   labelClass: 'label-weak',   text: 'Very Weak' },
            { pct: '40%', barClass: 'strength-fair',   labelClass: 'label-fair',   text: 'Weak' },
            { pct: '60%', barClass: 'strength-fair',   labelClass: 'label-fair',   text: 'Fair' },
            { pct: '80%', barClass: 'strength-good',   labelClass: 'label-good',   text: 'Strong' },
            { pct: '100%', barClass: 'strength-strong', labelClass: 'label-strong', text: 'Very Strong' }
        ];

        document.getElementById('newPassword').addEventListener('input', (e) => {
            const pwd = e.target.value;
            let met = 0;
            Object.values(reqs).forEach(r => {
                const ok = r.test(pwd);
                r.el.classList.toggle('met', ok);
                if (ok) met++;
            });

            strengthBar.className = 'strength-bar-fill';
            strengthLabel.className = 'strength-label';

            if (pwd.length === 0) {
                strengthBar.style.width = '0%';
                strengthLabel.textContent = '';
                return;
            }

            const lvl = levels[Math.min(met, 4)];
            strengthBar.style.width = lvl.pct;
            strengthBar.classList.add(lvl.barClass);
            strengthLabel.classList.add(lvl.labelClass);
            strengthLabel.textContent = lvl.text;
        });

        /* ---- Submit ---- */
        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const newPassword = document.getElementById('newPassword').value;
            const confirm     = document.getElementById('confirmPassword').value;
            const btn         = document.getElementById('submitBtn');

            // Client-side strong-password gate
            const allMet = Object.values(reqs).every(r => r.test(newPassword));
            if (!allMet) {
                showToast('Please meet all password requirements.', 'error');
                return;
            }

            if (newPassword !== confirm) {
                showToast('Passwords do not match.', 'error');
                return;
            }

            btn.disabled  = true;
            btn.innerText = 'Resetting...';

            try {
                const res  = await fetch(`${API_BASE_URL}/reset-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, newPassword })
                });
                const data = await res.json();

                if (res.ok) {
                    document.getElementById('resetForm').style.display   = 'none';
                    document.getElementById('successMsg').classList.remove('hidden');
                } else {
                    document.getElementById('errorText').innerText = data.error || 'Reset failed. The link may have expired.';
                    document.getElementById('errorMsg').classList.remove('hidden');
                    btn.disabled  = false;
                    btn.innerText = 'Reset Password';
                }
            } catch (err) {
                showToast('Connection error. Is the server running?', 'error');
                btn.disabled  = false;
                btn.innerText = 'Reset Password';
            }
        });
    </script>
</body>

</html>
