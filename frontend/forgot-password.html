<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - AI Interview Coach</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="auth-page">

    <button id="themeToggle" class="theme-toggle" aria-label="Toggle Dark Mode"
        style="position: absolute; top: 1.5rem; right: 1.5rem; z-index: 10;">
        <span>🌙</span>
    </button>

    <a href="login.html"
        style="position: absolute; top: 1.5rem; left: 1.5rem; color: var(--text-muted); font-weight: 600; text-decoration: none; display: flex; align-items: center; gap: 0.5rem; transition: color 0.2s; z-index: 10;">
        <span style="font-size: 1.2rem;">&larr;</span> Back to Login
    </a>

    <div class="auth-card">
        <div class="text-center mb-4">
            <div class="auth-logo">🔑</div>
            <h2>Forgot Password</h2>
            <p>Enter your email and we'll send you a reset link.</p>
        </div>

        <!-- Success State -->
        <div id="successMsg" class="hidden"
            style="background: rgba(16,185,129,0.1); border: 1px solid #10B981; border-radius: var(--radius-md); padding: 1.25rem; text-align: center; margin-bottom: 1rem;">
            <div style="font-size: 2rem; margin-bottom: 0.5rem;">✅</div>
            <p style="color: #10B981; margin: 0; font-weight: 600;">Reset link sent!</p>
            <p style="color: var(--text-muted); margin: 0.4rem 0 0; font-size: 0.9rem;">Check your inbox (and spam folder) for the reset email.</p>
            <a href="login.html" style="display: inline-block; margin-top: 1rem; color: var(--primary); font-weight: 600; font-size: 0.9rem;">← Back to Login</a>
        </div>

        <form id="forgotForm">
            <div class="auth-input-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" class="auth-input" placeholder="you@example.com" required>
            </div>
            <button type="submit" id="submitBtn" class="btn btn-primary auth-btn">Send Reset Link</button>
        </form>
    </div>

    <script src="js/main.js"></script>

    <script>
        const API_BASE_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
            ? 'http://localhost:5000' : '';

        document.getElementById('forgotForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const btn   = document.getElementById('submitBtn');

            btn.disabled    = true;
            btn.innerText   = 'Sending...';

            try {
                const res  = await fetch(`${API_BASE_URL}/forgot-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await res.json();

                if (res.ok) {
                    document.getElementById('successMsg').classList.remove('hidden');
                    document.getElementById('forgotForm').style.display = 'none';
                } else {
                    showToast(data.error || 'Something went wrong.', 'error');
                    btn.disabled  = false;
                    btn.innerText = 'Send Reset Link';
                }
            } catch (err) {
                showToast('Connection error. Is the server running?', 'error');
                btn.disabled  = false;
                btn.innerText = 'Send Reset Link';
            }
        });
    </script>
</body>

</html>
