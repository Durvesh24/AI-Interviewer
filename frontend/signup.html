<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - AI Interview Coach</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="auth-page">

    <!-- Theme Toggle -->
    <button id="themeToggle" class="theme-toggle" aria-label="Toggle Dark Mode"
        style="position: absolute; top: 1.5rem; right: 1.5rem; z-index: 10;">
        <span>🌙</span>
    </button>

    <a href="index.html"
        style="position: absolute; top: 1.5rem; left: 1.5rem; color: var(--text-muted); font-weight: 600; text-decoration: none; display: flex; align-items: center; gap: 0.5rem; transition: color 0.2s; z-index: 10;">
        <span style="font-size: 1.2rem;">&larr;</span> Home
    </a>

    <div class="auth-card">
        <div class="text-center mb-4">
            <div class="auth-logo">🚀</div>
            <h2>Create Account</h2>
            <p>Join to track your progress</p>
        </div>

        <form id="signupForm">
            <div class="auth-input-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" class="auth-input" placeholder="you@example.com" required>
            </div>

            <div class="auth-input-group">
                <label for="password">Password</label>
                <div class="password-wrapper">
                    <input type="password" id="password" class="auth-input" placeholder="Create a strong password" required>
                    <button type="button" class="toggle-password" id="togglePwd" aria-label="Show/Hide Password">👁</button>
                </div>
                <!-- Strength Bar -->
                <div class="strength-bar-wrapper">
                    <div class="strength-bar-fill" id="strengthBar"></div>
                </div>
                <div class="strength-label" id="strengthLabel"></div>
                <!-- Requirement Checklist -->
                <ul class="req-list" id="reqList">
                    <li class="req-item" id="req-len">8+ characters</li>
                    <li class="req-item" id="req-upper">Uppercase letter</li>
                    <li class="req-item" id="req-lower">Lowercase letter</li>
                    <li class="req-item" id="req-num">Number</li>
                    <li class="req-item" id="req-special">Special character</li>
                </ul>
            </div>

            <!-- Optional Admin Code -->
            <div class="auth-input-group"
                style="margin-top: 0.5rem; border-top: 1px dashed var(--border-color); padding-top: 1.25rem;">
                <label for="adminCode" style="color: var(--text-muted);">Admin Code (Optional)</label>
                <input type="text" id="adminCode" class="auth-input" placeholder="Enter secret code"
                    style="background: var(--bg-body);">
            </div>

            <button type="submit" class="btn btn-primary auth-btn" id="signupBtn">Create Account</button>
        </form>

        <div class="auth-footer text-center">
            <p style="margin: 0; color: var(--text-muted);">Already have an account? <a href="login.html"
                    style="color: var(--primary); font-weight: 700; text-decoration: none;">Sign in here</a></p>
        </div>
    </div>

    <!-- Main JS (for Toasts) -->
    <script src="js/main.js"></script>

    <script>
        const API_BASE_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
            ? 'http://localhost:5000'
            : '';

        /* ---- Show / Hide Toggle ---- */
        document.getElementById('togglePwd').addEventListener('click', () => {
            const pwd = document.getElementById('password');
            const btn = document.getElementById('togglePwd');
            if (pwd.type === 'password') {
                pwd.type = 'text';
                btn.textContent = '🙈';
            } else {
                pwd.type = 'password';
                btn.textContent = '👁';
            }
        });

        /* ---- Strength Engine ---- */
        const strengthBar  = document.getElementById('strengthBar');
        const strengthLabel = document.getElementById('strengthLabel');
        const reqs = {
            len:     { el: document.getElementById('req-len'),     test: p => p.length >= 8 },
            upper:   { el: document.getElementById('req-upper'),   test: p => /[A-Z]/.test(p) },
            lower:   { el: document.getElementById('req-lower'),   test: p => /[a-z]/.test(p) },
            num:     { el: document.getElementById('req-num'),     test: p => /[0-9]/.test(p) },
            special: { el: document.getElementById('req-special'), test: p => /[^A-Za-z0-9]/.test(p) }
        };

        const levels = [
            { pct: '20%', barClass: 'strength-weak',   labelClass: 'label-weak',   text: 'Very Weak' },
            { pct: '40%', barClass: 'strength-fair',   labelClass: 'label-fair',   text: 'Weak' },
            { pct: '60%', barClass: 'strength-fair',   labelClass: 'label-fair',   text: 'Fair' },
            { pct: '80%', barClass: 'strength-good',   labelClass: 'label-good',   text: 'Strong' },
            { pct: '100%', barClass: 'strength-strong', labelClass: 'label-strong', text: 'Very Strong' }
        ];

        document.getElementById('password').addEventListener('input', (e) => {
            const pwd = e.target.value;
            let met = 0;
            Object.values(reqs).forEach(r => {
                const ok = r.test(pwd);
                r.el.classList.toggle('met', ok);
                if (ok) met++;
            });

            // Clear previous bar/label classes
            strengthBar.className = 'strength-bar-fill';
            strengthLabel.className = 'strength-label';

            if (pwd.length === 0) {
                strengthBar.style.width = '0%';
                strengthLabel.textContent = '';
                return;
            }

            const lvl = levels[Math.min(met, 4)];
            strengthBar.style.width = lvl.pct;
            strengthBar.classList.add(lvl.barClass);
            strengthLabel.classList.add(lvl.labelClass);
            strengthLabel.textContent = lvl.text;
        });

        /* ---- Submit ---- */
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email     = document.getElementById('email').value;
            const password  = document.getElementById('password').value;
            const adminCode = document.getElementById('adminCode').value;
            const btn       = document.getElementById('signupBtn');

            // Client-side strong-password gate
            const allMet = Object.values(reqs).every(r => r.test(password));
            if (!allMet) {
                showToast('Please meet all password requirements before creating your account.', 'error');
                return;
            }

            btn.disabled = true;
            btn.innerText = 'Creating account...';

            try {
                const res = await fetch(`${API_BASE_URL}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, adminCode })
                });

                const data = await res.json();

                if (res.ok) {
                    showToast('Account created successfully!', 'success');
                    setTimeout(() => window.location.href = 'login.html', 1500);
                } else {
                    showToast(data.error || 'Registration failed', 'error');
                    btn.disabled = false;
                    btn.innerText = 'Create Account';
                }
            } catch (err) {
                console.error(err);
                showToast('Connection error.', 'error');
                btn.disabled = false;
                btn.innerText = 'Create Account';
            }
        });
    </script>
</body>

</html>
